<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4db6ac">
    <title>VitalFlow - Tu Salud</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .app-container { 
            width: 100%; 
            max-width: 500px; 
            min-height: 100vh; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }
        header { 
            background-color: #4db6ac; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 20px; 
        }
        .auth-box { padding: 25px; text-align: center; }
        .auth-box input { margin: 8px 0; }
        .auth-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .btn-salir { 
            background: #ef5350; 
            margin: 10px; 
            align-self: flex-end; 
            padding: 6px 12px; 
            font-size: 14px; 
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .search-section { padding: 15px; background: #fff; border-bottom: 1px solid #eee; }
        .search-barra { display: flex; gap:8px; align-items:center; }
        #universalSearch { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #4db6ac; 
            border-radius: 25px; 
            font-size: 16px; 
        }
        .btn-web { 
            padding: 12px 16px; 
            background: #2196f3; 
            border-radius: 25px; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
        }
        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            scroll-behavior: smooth;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        nav { 
            display: flex; 
            border-top: 1px solid #ddd; 
            background: white; 
            padding: 5px 0; 
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        nav button { 
            flex: 1; 
            padding: 10px 5px; 
            border: none; 
            background: none; 
            cursor: pointer; 
            color: #777; 
            font-weight: bold; 
            font-size: 11px; 
            transition: all 0.2s;
        }
        nav button.active { color: #4db6ac; border-top: 2px solid #4db6ac; }

        /* ==== CHAT ==== */
        #mensajesChat { 
            height: 320px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            background: #fafafa; 
            overscroll-behavior: contain;
        }
        .mensaje-usuario { 
            background: #d9fdd3; 
            padding: 10px 12px; 
            border-radius: 8px 0 8px 8px; 
            margin: 6px 0 6px auto; 
            max-width: 80%; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            word-wrap: break-word;
        }
        .mensaje-otro { 
            background: white; 
            padding: 10px 12px; 
            border-radius: 0 8px 8px 8px; 
            margin: 6px 0; 
            max-width: 80%; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            word-wrap: break-word;
        }
        .msg-remitente { font-size: 12px; font-weight: bold; color: #4db6ac; margin-bottom: 4px; }
        .msg-meta { 
            font-size: 10px; 
            color: #666; 
            text-align: right; 
            margin-top: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 3px; 
        }
        .check-visto { color: #039be5; }
        .msg-archivo { 
            background: #e3f2fd; 
            padding: 8px; 
            border-radius: 6px; 
            margin: 6px 0; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        .msg-imagen { 
            max-width: 100%; 
            border-radius: 6px; 
            margin: 6px 0; 
            cursor: pointer; 
            image-rendering: -webkit-optimize-contrast;
        }
        .msg-audio { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 8px; 
            background: #f0f4ff; 
            border-radius: 24px; 
            margin: 6px 0; 
            min-width: 200px;
        }
        .audio-btn { 
            background: #4db6ac; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 36px; 
            height: 36px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            cursor: pointer; 
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .audio-btn:hover { background: #26a69a; }
        .msg-audio audio { flex: 1; height: 32px; }
        .msg-video { max-width: 100%; border-radius: 6px; margin: 6px 0; }

        .chat-barra { display: flex; gap: 6px; align-items: flex-end; margin-top: 8px; }
        .chat-input { flex: 1; margin: 0; padding: 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 16px; }
        .chat-botones-accion { display: flex; flex-direction: column; gap: 4px; }
        .btn-accion { 
            background: none; 
            border: none; 
            font-size: 22px; 
            padding: 4px; 
            cursor: pointer; 
            color: #4db6ac; 
            transition: color 0.2s;
        }
        .btn-accion:hover { color: #26a69a; }
        .btn-enviar { 
            border-radius: 50%; 
            width: 42px; 
            height: 42px; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            background: #26a69a; 
            border: none;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-enviar:hover { background: #00897b; }

        .grabando { color: #e53935; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 0%,100% {opacity:1;} 50% {opacity:0.3;} }

        .card-citas { 
            background: #fff3e0; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            border-left: 5px solid #ff9800; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            gap: 6px; 
            flex-wrap: wrap; 
        }
        .card-archivo { 
            background: #e3f2fd; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            border-left: 5px solid #2196f3; 
        }
        .img-preview { 
            max-width: 100%; 
            max-height: 150px; 
            border-radius: 6px; 
            margin: 6px 0; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .img-preview:active { transform: scale(0.98); }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 6px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 16px; 
            font-family: inherit;
        }
        button { 
            padding: 10px 12px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            background: #4db6ac; 
            color: white; 
            font-weight: 500; 
            font-size: 15px; 
            transition: background 0.2s;
        }
        button:hover { background: #42a59c; }
        .btn-camara { background: #ff9800; margin-bottom: 8px; width: 100%; padding:12px; font-size:16px; }
        .btn-camara:hover { background: #fb8c00; }
        .btn-archivo { background: #26a69a; width: 100%; padding:12px; font-size:16px; margin-bottom: 8px; }
        .btn-archivo:hover { background: #00897b; }
        .file-actions, .card-actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .cargando { font-size: 13px; color: #2196f3; margin: 8px 0; }
        .error { font-size: 13px; color: #e53935; margin: 8px 0; }
        .exito { font-size: 13px; color: #2e7d32; margin: 8px 0; }
        .oculto { display: none !important; }
        .btn-compartir { background: #9c27b0; font-size: 13px; padding: 5px 8px; }
        .btn-compartir:hover { background: #8e24aa; }
        .btn-borrar { background:#ff5252; padding:5px 8px; font-size:13px; }
        .aviso { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 999; max-width: 90%; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <header>VitalFlow</header>

    <div id="pantalla-auth" class="auth-box">
        <h2>Bienvenido a VitalFlow</h2>
        <input type="email" id="correoAuth" placeholder="Tu correo electrónico" autocomplete="email">
        <input type="password" id="claveAuth" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="current-password">
        <div class="auth-buttons">
            <button onclick="Auth.iniciarSesion()">Ingresar</button>
            <button onclick="Auth.registrarUsuario()" style="background:#2196f3;">Crear cuenta</button>
        </div>
        <p id="mensajeAuth" style="margin-top:12px; color:#d32f2f;"></p>
    </div>

    <div id="contenido-app" class="oculto">
        <button class="btn-salir" onclick="Auth.cerrarSesion()">🚪 Cerrar sesión</button>

        <div class="search-section">
            <div class="search-barra">
                <input type="text" id="universalSearch" placeholder="🔍 Buscar en Internet...">
                <button class="btn-web" onclick="Buscar.enWeb()">🔎</button>
            </div>
        </div>

        <div class="content-area">
            <div id="tab-medicinas" class="tab-content active">
                <h2>Mis Medicinas</h2>
                <input type="text" id="medName" placeholder="Nombre del medicamento">
                <input type="time" id="medTime">
                <button onclick="Medicinas.agregarRecordatorio()">Guardar Recordatorio</button>
                <div id="lista-medicinas" style="margin-top: 15px;"></div>
            </div>

            <div id="tab-agenda" class="tab-content">
                <h2>Mi Agenda</h2>
                <input type="text" id="citaDoctor" placeholder="Nombre del doctor / Consultorio">
                <input type="datetime-local" id="citaFecha">
                <button onclick="Agenda.agregarCita()">Agendar Cita</button>
                <div id="lista-citas" style="margin-top: 15px;"></div>
            </div>

            <div id="tab-archivos" class="tab-content">
                <h2>Mis Documentos e Imágenes</h2>

                <input type="file" id="subir-foto" accept="image/*" style="display:none">
                <button class="btn-archivo" onclick="document.getElementById('subir-foto').click()">📸 Subir desde Galería</button>

                <input type="file" id="tomar-foto" accept="image/*" capture="environment" style="display:none">
                <button class="btn-camara" onclick="document.getElementById('tomar-foto').click()">📷 Tomar Foto</button>

                <input type="file" id="subir-documento" accept=".pdf,.doc,.docx,.txt" style="display:none">
                <button class="btn-archivo" onclick="document.getElementById('subir-documento').click()">📄 Subir Documento</button>

                <div id="cargaEstadoArchivos" class="cargando"></div>
                <div id="lista-archivos" style="margin-top:20px;"></div>
            </div>

            <div id="tab-chat" class="tab-content">
                <h2>Comunidad VitalFlow</h2>
                <div id="mensajesChat"></div>

                <div class="chat-barra">
                    <div class="chat-botones-accion">
                        <input type="file" id="chatAdjuntar" accept="*" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatAdjuntar').click()" title="Adjuntar archivo 📎">📎</button>
                        
                        <input type="file" id="chatCamara" accept="image/*" capture="environment" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatCamara').click()" title="Tomar foto 📷">📷</button>
                        
                        <input type="file" id="chatVideo" accept="video/*" capture="environment" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatVideo').click()" title="Grabar video 🎥">🎥</button>
                    </div>

                    <input type="text" id="msgChatInput" class="chat-input" placeholder="Escribe un mensaje..." enterkeyhint="send">
                    <button class="btn-enviar" onclick="Chat.enviarMensaje()">➤</button>
                </div>
            </div>
        </div>

        <nav>
            <button onclick="Navegacion.mostrarTab('medicinas', this)" class="active">Medicinas</button>
            <button onclick="Navegacion.mostrarTab('agenda', this)">Agenda</button>
            <button onclick="Navegacion.mostrarTab('archivos', this)">Archivos</button>
            <button onclick="Navegacion.mostrarTab('chat', this)">Chat</button>
        </nav>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { 
        getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
        signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { 
        getDatabase, ref, push, remove, get, onChildAdded, 
        query, orderByChild 
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA-y2DZvJ9L0zl9tBEjY1pYsrQfR5Ky2Zc",
        authDomain: "vitalflow-259c0.firebaseapp.com",
        projectId: "vitalflow-259c0",
        databaseURL: "https://vitalflow-259c0-default-rtdb.firebaseio.com/",
        storageBucket: "vitalflow-259c0.appspot.com",
        messagingSenderId: "650208796328",
        appId: "1:650208796328:web:ea260384268c9b7fcc6c9d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const CLOUD_NAME = "rsfldf4n";
    const UPLOAD_PRESET = "vitalflow_archivos";
    const TAMANO_MAXIMO = 20 * 1024 * 1024; // 20MB
    const TIPOS_PERMITIDOS = ["image/", "video/", "audio/", "application/pdf", "text/"];

    let usuarioActual = null;
    let idsMensajesCargados = new Set();
    let chatIniciado = false; // ✅ Evita múltiples listeners

    // ✅ Aviso compatible con todas las versiones de Android
    function mostrarAviso(texto, esError = false) {
        const aviso = document.createElement("div");
        aviso.className = "aviso";
        aviso.style.background = esError ? "#d32f2f" : "#333";
        aviso.textContent = texto;
        document.body.appendChild(aviso);
        setTimeout(() => aviso.remove(), 3000);
    }

    // ✅ Confirmación compatible
    function confirmar(texto) {
        return new Promise(res => {
            if(window.confirm) return res(window.confirm(texto));
            mostrarAviso("Acción confirmada");
            res(true);
        });
    }

    window.Compartir = {
        texto: (titulo, contenido) => {
            const mensaje = `📋 VitalFlow - ${titulo}:\n${contenido}`;
            if(navigator.share) navigator.share({title: 'VitalFlow', text: mensaje});
            else navigator.clipboard.writeText(mensaje).then(() => mostrarAviso("📋 Copiado al portapapeles!"));
        },
        enlace: (titulo, url) => {
            if(navigator.share) navigator.share({title: 'VitalFlow - ' + titulo, url: url});
            else navigator.clipboard.writeText(url).then(() => mostrarAviso("📋 Enlace copiado!"));
        }
    };

    window.Auth = {
        registrarUsuario: async () => {
            const correo = document.getElementById('correoAuth').value.trim();
            const clave = document.getElementById('claveAuth').value;
            const aviso = document.getElementById('mensajeAuth');
            const errores = {
                'auth/invalid-email': 'Correo no válido',
                'auth/email-already-in-use': 'Este correo ya existe',
                'auth/weak-password': 'Mínimo 6 caracteres'
            };
            try {
                await createUserWithEmailAndPassword(auth, correo, clave);
                aviso.textContent = "✅ Cuenta creada!";
                aviso.style.color = "#2e7d32";
            } catch (e) {
                aviso.textContent = "⚠️ " + (errores[e.code] || "Error: " + e.message);
            }
        },
        iniciarSesion: async () => {
            const correo = document.getElementById('correoAuth').value.trim();
            const clave = document.getElementById('claveAuth').value;
            const aviso = document.getElementById('mensajeAuth');
            try {
                await signInWithEmailAndPassword(auth, correo, clave);
                aviso.textContent = "✅ Entrando...";
            } catch (e) {
                aviso.textContent = "⚠️ Datos incorrectos o error: " + e.message;
            }
        },
        cerrarSesion: () => {
            idsMensajesCargados.clear();
            chatIniciado = false; // ✅ Reiniciamos bandera al salir
            signOut(auth);
        }
    };

    onAuthStateChanged(auth, (usuario) => {
        usuarioActual = usuario;
        if (usuario) {
            document.getElementById('pantalla-auth').classList.add('oculto');
            document.getElementById('contenido-app').classList.remove('oculto');
            cargarDatos();
            setTimeout(() => Chat.iniciarChat(), 600);
        } else {
            document.getElementById('pantalla-auth').classList.remove('oculto');
            document.getElementById('contenido-app').classList.add('oculto');
            idsMensajesCargados.clear();
        }
    });

    window.Navegacion = {
        mostrarTab: (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            btn.classList.add('active');
        }
    };

    window.Buscar = { 
        enWeb: () => {
            const termino = document.getElementById('universalSearch').value.trim();
            if(!termino) return;
            // ✅ Más compatible en Android
            location.href = `https://google.com/search?q=${encodeURIComponent(termino)}+salud`;
        }
    };

    // ✅ Validación antes de subir
    function validarArchivo(archivo) {
        if(archivo.size > TAMANO_MAXIMO) {
            mostrarAviso("❌ Archivo muy grande. Máximo 20MB", true);
            return false;
        }
        const permitido = TIPOS_PERMITIDOS.some(tipo => archivo.type.startsWith(tipo));
        if(!permitido) {
            mostrarAviso("❌ Tipo de archivo no permitido", true);
            return false;
        }
        return true;
    }

    // ✅ Subida directa por API sin widget
    async function subirArchivoCloudinary(archivo) {
        if(!validarArchivo(archivo)) throw new Error("Archivo inválido");

        const estado = document.getElementById('cargaEstadoArchivos');
        estado.textContent = "⏳ Subiendo...";
        estado.className = "cargando";

        try {
            const formData = new FormData();
            formData.append("file", archivo);
            formData.append("upload_preset", UPLOAD_PRESET);
            formData.append("folder", "vitalflow_archivos");
            formData.append("quality", "auto");
            formData.append("fetch_format", "auto");
const respuesta = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
    {
        method: "POST",
        body: formData
    }
);
            
            const datos = await respuesta.json();
            if (!respuesta.ok) throw new Error(datos.error?.message || "Error al subir");

            estado.textContent = "✅ Subido correctamente!";
            estado.className = "exito";
            setTimeout(() => estado.textContent = "", 3000);

            return {
                url: datos.secure_url,
                nombre: archivo.name,
                tipo: archivo.type || datos.resource_type,
                tamano: archivo.size
            };
        } catch (err) {
            estado.textContent = "❌ Error: " + err.message;
            estado.className = "error";
            setTimeout(() => estado.textContent = "", 5000);
            throw err;
        }
    }
    
    async function guardarArchivoEnBD(datosArchivo) {
        if (!usuarioActual) return;
        try {
            await push(ref(db, `usuarios/${usuarioActual.uid}/archivos`), {
                ...datosArchivo,
                fecha: new Date().toISOString()
            });
        } catch (e) {
            mostrarAviso("❌ No se pudo guardar: sin conexión", true);
        }
    }

    async function procesarArchivo(e) {
        const archivo = e.target.files[0];
        if (!archivo) return;
        try {
            const datosArchivo = await subirArchivoCloudinary(archivo);
            await guardarArchivoEnBD(datosArchivo);
            await cargarDatos();
        } catch (err) { 
            console.error("Error:", err); 
        }
        e.target.value = "";
    }

    document.getElementById('subir-foto').addEventListener('change', procesarArchivo);
    document.getElementById('tomar-foto').addEventListener('change', procesarArchivo);
    document.getElementById('subir-documento').addEventListener('change', procesarArchivo);
    
    document.getElementById('chatAdjuntar').addEventListener('change', async (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;
        try {
            const datos = await subirArchivoCloudinary(archivo);
            await Chat.enviarMensajeArchivo(datos);
        } catch (err) { console.error("Error:", err); }
        e.target.value = "";
    });

    document.getElementById('chatCamara').addEventListener('change', async (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;
        try {
            const datos = await subirArchivoCloudinary(archivo);
            await Chat.enviarMensajeArchivo(datos);
        } catch (err) { console.error("Error:", err); }
        e.target.value = "";
    });

    document.getElementById('chatVideo').addEventListener('change', async (e) => {
        const archivo = e.target.files[0];
        if (!archivo) return;
        try {
            const datos = await subirArchivoCloudinary(archivo);
            await Chat.enviarMensajeArchivo(datos);
        } catch (err) { console.error("Error:", err); }
        e.target.value = "";
    });

    async function cargarDatos() {
        if (!usuarioActual) return;
        const uid = usuarioActual.uid;

        const listaMed = document.getElementById('lista-medicinas');
        listaMed.innerHTML = '';
        try {
            const medsSnap = await get(ref(db, `usuarios/${uid}/medicinas`));
            if (medsSnap.exists()) {
                Object.entries(medsSnap.val() || {}).forEach(([id, datos]) => {
                    listaMed.innerHTML += `
                    <div class="card-citas">
                        <span>💊 ${datos.nombre} - ${datos.hora}</span>
                        <div class="card-actions">
                            <button class="btn-compartir" onclick="Compartir.texto('Medicamento', '${datos.nombre} a las ${datos.hora}')">🔗</button>
                            <button class="btn-borrar" onclick="borrarItem('medicinas','${id}')">×</button>
                        </div>
                    </div>`;
                });
            }
        } catch { mostrarAviso("Sin conexión: no se cargaron medicinas", true); }

        const listaCitas = document.getElementById('lista-citas');
        listaCitas.innerHTML = '';
        try {
            const citasSnap = await get(ref(db, `usuarios/${uid}/citas`));
            if (citasSnap.exists()) {
                Object.entries(citasSnap.val() || {}).forEach(([id, datos]) => {
                    listaCitas.innerHTML += `
                    <div class="card-citas">
                        <span>📅 ${datos.doctor} - ${datos.fecha.replace('T',' ')}</span>
                        <div class="card-actions">
                            <button class="btn-compartir" onclick="Compartir.texto('Cita', 'Con ${datos.doctor} el ${datos.fecha.replace('T',' ')}')">🔗</button>
                            <button class="btn-borrar" onclick="borrarItem('citas','${id}')">×</button>
                        </div>
                    </div>`;
                });
            }
        } catch { mostrarAviso("Sin conexión: no se cargaron citas", true); }

        const listaArchivos = document.getElementById('lista-archivos');
        listaArchivos.innerHTML = '';
        try {
            const archSnap = await get(ref(db, `usuarios/${uid}/archivos`));
            if (archSnap.exists()) {
                Object.entries(archSnap.val() || {}).forEach(([id, datos]) => {
                    const esImagen = datos.tipo?.startsWith('image/');
                    listaArchivos.innerHTML += `
                    <div class="card-archivo">
                        ${esImagen ? `<img src="${datos.url}" class="img-preview" onclick="location.href='${datos.url}'">` : ''}
                        <div><strong>📎 ${datos.nombre}</strong></div>
                        <div style="font-size:12px; color:#666;">${new Date(datos.fecha).toLocaleString()}</div>
                        <div class="file-actions">
                            <button class="btn-compartir" onclick="Compartir.enlace('${datos.nombre}', '${datos.url}')">🔗 Compartir</button>
                            <button class="btn-borrar" onclick="borrarItem('archivos','${id}')">🗑️ Eliminar</button>
                        </div>
                    </div>`;
                });
            }
        } catch { mostrarAviso("Sin conexión: no se cargaron archivos", true); }
    }

    window.borrarItem = async (ruta, id) => {
        if (!await confirmar("¿Seguro que quieres eliminar esto?")) return;
        if (!usuarioActual) return;
        try {
            await remove(ref(db, `usuarios/${usuarioActual.uid}/${ruta}/${id}`));
            await cargarDatos();
        } catch { mostrarAviso("❌ No se pudo eliminar", true); }
    };

    window.Medicinas = {
        agregarRecordatorio: async () => {
            const nombre = document.getElementById('medName').value.trim();
            const hora = document.getElementById('medTime').value;
            if(!nombre || !hora) return mostrarAviso("Completa todos los datos", true);
            if (!usuarioActual) return;
            try {
                await push(ref(db, `usuarios/${usuarioActual.uid}/medicinas`), { nombre, hora });
                document.getElementById('medName').value = "";
                document.getElementById('medTime').value = "";
                cargarDatos();
            } catch { mostrarAviso("❌ No se pudo guardar", true); }
        }
    };

    window.Agenda = {
        agregarCita: async () => {
            const doctor = document.getElementById('citaDoctor').value.trim();
            const fecha = document.getElementById('citaFecha').value;
            if(!doctor || !fecha) return mostrarAviso("Completa todos los datos", true);
            if (!usuarioActual) return;
            try {
                await push(ref(db, `usuarios/${usuarioActual.uid}/citas`), { doctor, fecha });
                document.getElementById('citaDoctor').value = "";
                document.getElementById('citaFecha').value = "";
                cargarDatos();
            } catch { mostrarAviso("❌ No se pudo guardar", true); }
        }
    };

    window.Chat = {
        iniciarChat: () => {
            // ✅ Evitamos múltiples listeners
            if(chatIniciado) return;
            chatIniciado = true;
            idsMensajesCargados.clear();

            const cajaChat = document.getElementById("mensajesChat");
            cajaChat.innerHTML = ""; // ✅ Limpiamos mensajes antiguos

            onChildAdded(query(ref(db, "chat"), orderByChild("fecha")), (snap) => {
                // ✅ Evitamos duplicados
                if (idsMensajesCargados.has(snap.key)) return;
                idsMensajesCargados.add(snap.key);

                const msg = snap.val();
                const esMio = msg.remitente === usuarioActual?.email;

                let contenido = msg.texto ? `<div class="msg-texto">${msg.texto}</div>` : "";
                
                // ✅ Etiqueta audio corregida
                if(msg.archivo) {
                    if(msg.tipo?.startsWith("image/")) {
                        contenido = `<img src="${msg.archivo}" class="msg-imagen" onclick="location.href='${msg.archivo}'" loading="lazy">`;
                    } else if(msg.tipo?.startsWith("video/")) {
                        contenido = `<video src="${msg.archivo}" controls class="msg-video" preload="metadata"></video>`;
                    } else if(msg.tipo?.startsWith("audio/")) {
                        contenido = `
                        <div class="msg-audio">
                            <button class="audio-btn" onclick="this.nextElementSibling.play()">▶</button>
                            <audio controls src="${msg.archivo}">
                        </div>`;
                    } else {
                        contenido = `<div class="msg-archivo" onclick="location.href='${msg.archivo}'">📄 ${msg.nombreArchivo || 'Archivo'}</div>`;
                    }
                }

                cajaChat.innerHTML += `
                <div class="${esMio ? 'mensaje-usuario' : 'mensaje-otro'}">
                    ${!esMio ? `<div class="msg-remitente">${msg.nombreRemitente || msg.remitente.split('@')[0]}</div>` : ""}
                    ${contenido}
                    <div class="msg-meta">
                        ${new Date(msg.fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                        ${esMio ? `<span class="check-visto">✓✓</span>` : ""}
                    </div>
                </div>`;

                requestAnimationFrame(() => cajaChat.scrollTop = cajaChat.scrollHeight);
            });
        },

        enviarMensaje: async () => {
            const texto = document.getElementById("msgChatInput").value.trim();
            // ✅ Validamos que no esté vacío
            if(!texto || texto.length === 0 || !usuarioActual) return;
            try {
                await push(ref(db, "chat"), {
                    texto, 
                    remitente: usuarioActual.email,
                    nombreRemitente: usuarioActual.displayName || usuarioActual.email.split('@')[0],
                    fecha: new Date().toISOString()
                });
                document.getElementById("msgChatInput").value = "";
            } catch { mostrarAviso("❌ No se pudo enviar: sin conexión", true); }
        },

        enviarMensajeArchivo: async (datosArchivo) => {
            if (!usuarioActual) return;
            try {
                await push(ref(db, "chat"), {
                    archivo: datosArchivo.url, 
                    nombreArchivo: datosArchivo.nombre,
                    tipo: datosArchivo.tipo, 
                    remitente: usuarioActual.email,
                    nombreRemitente: usuarioActual.displayName || usuarioActual.email.split('@')[0],
                    fecha: new Date().toISOString()
                });
            } catch { mostrarAviso("❌ No se pudo enviar el archivo", true); }
        }
    };

    // Enviar con Enter
    document.getElementById("msgChatInput").addEventListener("keydown", (e) => {
        if(e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            Chat.enviarMensaje();
        }
    });

</script>
</body>
</html>
