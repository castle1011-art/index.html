<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalFlow</title>
    <style>
        /* 🔹 TUS ESTILOS ORIGINALES - TAL CUAL TU PANTALLA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; min-height: 100vh; padding-bottom: 70px; }

        /* Barra superior */
        .barra-superior {
            background: #48b0a0;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            position: relative;
        }
        .btn-cerrar {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Buscador */
        .buscador {
            margin: 15px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .buscador input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 1rem;
        }
        .btn-lupa {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2196F3;
            border: none;
            color: white;
            font-size: 1.1rem;
        }

        /* Contenido principal */
        .contenido { padding: 0 15px; display: none; }
        .contenido.activo { display: block; }
        h2 { color: #222; margin-bottom: 15px; font-size: 1.5rem; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            background: #f0f0f0;
        }
        .btn-guardar {
            background: #48b0a0;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            margin-top: 8px;
        }

        /* Pestañas inferiores */
        .pestañas {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: white;
            border-top: 1px solid #eee;
        }
        .pestaña {
            flex: 1;
            text-align: center;
            padding: 15px 8px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }
        .pestaña.activo { color: #48b0a0; font-weight: bold; border-bottom: 2px solid #48b0a0; }

        /* Sección Archivos - Arreglada */
        .btn-foto, .btn-galeria {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
        }
        .btn-foto { background: #ff9800; color: white; }
        .btn-galeria { background: #9c27b0; color: white; }
        .vista-previa { margin-top: 15px; }
        .vista-previa img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- 🟢 BARRA SUPERIOR - IGUAL A TU APP -->
    <div class="barra-superior">
        <button class="btn-cerrar">Cerrar sesión</button>
        VitalFlow
    </div>

    <!-- BUSCADOR -->
    <div class="buscador">
        <input type="text" placeholder="Buscar aquí o en Internet...">
        <button class="btn-lupa">🔍</button>
    </div>

    <!-- 📂 SECCIÓN: MIS MEDICINAS (ACTIVA POR DEFECTO) -->
    <div id="medicinas" class="contenido activo">
        <h2>Mis Medicinas</h2>
        <input type="text" placeholder="Nombre del medicamento">
        <select>
            <option>Seleccionar dosis/horario</option>
        </select>
        <button class="btn-guardar">Guardar Recordatorio</button>
    </div>

    <!-- AGENDA -->
    <div id="agenda" class="contenido">
        <h2>Agenda</h2>
        <!-- Tu contenido de agenda igual -->
    </div>

    <!-- ARCHIVOS - CORREGIDO SIN AVISO -->
    <div id="archivos" class="contenido">
        <h2>Mis Documentos e Imágenes</h2>

        <button class="btn-foto" onclick="abrirCamara()">📸 Tomar Foto</button>
        <button class="btn-galeria" onclick="abrirGaleria()">📂 Subir desde Galería</button>

        <!-- CAMPOS OCULTOS (ARREGLADOS) -->
        <input type="file" id="camaraInput" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="galeriaInput" accept="image/*" style="display:none">

        <div id="vistaPrevia" class="vista-previa"></div>
    </div>

    <!-- CHAT -->
    <div id="chat" class="contenido">
        <h2>Chat</h2>
        <!-- Tu chat igual -->
    </div>

    <!-- 📌 PESTAÑAS INFERIORES IGUALES -->
    <div class="pestañas">
        <div class="pestaña activo" onclick="cambiarPestaña('medicinas')">Medicinas</div>
        <div class="pestaña" onclick="cambiarPestaña('agenda')">Agenda</div>
        <div class="pestaña" onclick="cambiarPestaña('archivos')">Archivos</div>
        <div class="pestaña" onclick="cambiarPestaña('chat')">Chat</div>
    </div>


    <script>
        // 🔹 FUNCIONES IGUALES A TU LOGICA
        function cambiarPestaña(nombre) {
            // Ocultar todos los contenidos
            document.querySelectorAll('.contenido').forEach(c => c.classList.remove('activo'));
            // Quitar activo a pestañas
            document.querySelectorAll('.pestaña').forEach(p => p.classList.remove('activo'));
            // Mostrar el seleccionado
            document.getElementById(nombre).classList.add('activo');
            event.target.classList.add('activo');
        }

        // 🔹 CÁMARA Y GALERÍA ARREGLADAS
        function abrirCamara() {
            document.getElementById('camaraInput').click();
        }
        function abrirGaleria() {
            document.getElementById('galeriaInput').click();
        }

        // Mostrar foto cargada
        document.getElementById('camaraInput').addEventListener('change', verImagen);
        document.getElementById('galeriaInput').addEventListener('change', verImagen);

        function verImagen(e) {
            const archivo = e.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(evt) {
                document.getElementById('vistaPrevia').innerHTML = 
                    `<img src="${evt.target.result}" alt="Foto cargada">`;
            };
            lector.readAsDataURL(archivo);
        }

        // AQUÍ PUEDES PEGAR EL RESTO DE TU CÓDIGO JS QUE YA FUNCIONA
    </script>
</body>
</html>
