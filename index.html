<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4db6ac">

    <title>VitalFlow - Tu Salud</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

    <header>VitalFlow</header>

    <!-- ================= AUTENTICACIÓN ================= -->

    <div id="pantalla-auth" class="auth-box">

        <h2>Bienvenido a VitalFlow</h2>

        <input
            type="email"
            id="correoAuth"
            placeholder="Tu correo electrónico"
            autocomplete="email">

        <input
            type="password"
            id="claveAuth"
            placeholder="Contraseña (mínimo 6 caracteres)"
            autocomplete="current-password">

        <div class="auth-buttons">
            <button onclick="Auth.iniciarSesion()">Ingresar</button>

            <button
                onclick="Auth.registrarUsuario()"
                style="background:#2196f3;">
                Crear cuenta
            </button>
        </div>

        <p id="mensajeAuth"
           style="margin-top:12px;color:#d32f2f;"></p>

    </div>

    <!-- ================= CONTENIDO ================= -->

    <div id="contenido-app" class="oculto">

        <button
            class="btn-salir"
            onclick="Auth.cerrarSesion()">
            🚪 Cerrar sesión
        </button>

        <!-- ================= BUSCADOR ================= -->

        <div class="search-section">

            <div class="search-barra">

                <input
                    type="text"
                    id="universalSearch"
                    placeholder="🔍 Buscar en Internet...">

                <button
                    class="btn-web"
                    onclick="Buscar.enWeb()">
                    🔎
                </button>

            </div>

        </div>

        <!-- ================= CONTENIDO ================= -->

        <div class="content-area">

            <!-- MEDICINAS -->

            <div id="tab-medicinas" class="tab-content active">

                <h2>Mis Medicinas</h2>

                <input
                    type="text"
                    id="medName"
                    placeholder="Nombre del medicamento">

                <input
                    type="time"
                    id="medTime">

                <button onclick="Medicinas.agregarRecordatorio()">
                    Guardar Recordatorio
                </button>

                <div
                    id="lista-medicinas"
                    style="margin-top:15px;">
                </div>

            </div>

            <!-- AGENDA -->

            <div id="tab-agenda" class="tab-content">

                <h2>Mi Agenda</h2>

                <input
                    type="text"
                    id="citaDoctor"
                    placeholder="Nombre del doctor / Consultorio">

                <input
                    type="datetime-local"
                    id="citaFecha">

                <button onclick="Agenda.agregarCita()">
                    Agendar Cita
                </button>

                <div
                    id="lista-citas"
                    style="margin-top:15px;">
                </div>

            </div>

            <!-- ARCHIVOS -->

            <div id="tab-archivos" class="tab-content">

                <h2>Mis Documentos e Imágenes</h2>

                <input
                    type="file"
                    id="subir-foto"
                    accept="image/*"
                    style="display:none;">

                <button
                    class="btn-archivo"
                    onclick="document.getElementById('subir-foto').click()">
                    📸 Subir desde Galería
                </button>

                <input
                    type="file"
                    id="tomar-foto"
                    accept="image/*"
                    capture="environment"
                    style="display:none;">

                <button
                    class="btn-camara"
                    onclick="document.getElementById('tomar-foto').click()">
                    📷 Tomar Foto
                </button>

                <input
                    type="file"
                    id="subir-documento"
                    accept=".pdf,.doc,.docx,.txt"
                    style="display:none;">

                <button
                    class="btn-archivo"
                    onclick="document.getElementById('subir-documento').click()">
                    📄 Subir Documento
                </button>

                <div
                    id="cargaEstadoArchivos"
                    class="cargando">
                </div>

                <div
                    id="lista-archivos"
                    style="margin-top:20px;">
                </div>

            </div>

            <!-- CHAT -->
                        <!-- CHAT -->

            <div id="tab-chat" class="tab-content">

                <h2>Comunidad VitalFlow</h2>

                <div id="mensajesChat"></div>

                <div class="chat-barra">

                    <div class="chat-botones-accion">

                        <input
                            type="file"
                            id="chatAdjuntar"
                            accept="*"
                            style="display:none;">

                        <button
                            class="btn-accion"
                            onclick="document.getElementById('chatAdjuntar').click()"
                            title="Adjuntar archivo 📎">
                            📎
                        </button>

                        <input
                            type="file"
                            id="chatCamara"
                            accept="image/*"
                            capture="environment"
                            style="display:none;">

                        <button
                            class="btn-accion"
                            onclick="document.getElementById('chatCamara').click()"
                            title="Tomar foto 📷">
                            📷
                        </button>

                        <input
                            type="file"
                            id="chatVideo"
                            accept="video/*"
                            capture="environment"
                            style="display:none;">

                        <button
                            class="btn-accion"
                            onclick="document.getElementById('chatVideo').click()"
                            title="Grabar video 🎥">
                            🎥
                        </button>

                    </div>

                    <input
                        type="text"
                        id="msgChatInput"
                        class="chat-input"
                        placeholder="Escribe un mensaje..."
                        enterkeyhint="send">

                    <button
                        class="btn-enviar"
                        onclick="Chat.enviarMensaje()">
                        ➤
                    </button>

                </div>

            </div>

        </div>

        <nav>

            <button
                onclick="Navegacion.mostrarTab('medicinas', this)"
                class="active">
                Medicinas
            </button>

            <button
                onclick="Navegacion.mostrarTab('agenda', this)">
                Agenda
            </button>

            <button
                onclick="Navegacion.mostrarTab('archivos', this)">
                Archivos
            </button>

            <button
                onclick="Navegacion.mostrarTab('chat', this)">
                Chat
            </button>

        </nav>

    </div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- Funciones de la aplicación -->
<script type="module" src="app.js"></script>

</body>
</html>
