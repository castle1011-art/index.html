<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4db6ac">
    <title>VitalFlow - Tu Salud</title>

    <!-- ==================================================
         SECCIÓN 1: ESTILOS VISUALES
    ================================================== -->
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:'Segoe UI',Roboto,sans-serif;
            background:#f4f7f6;
            display:flex;
            justify-content:center;
            min-height:100vh;
        }
        .app-container{
            width:100%;
            max-width:500px;
            min-height:100vh;
            background:#fff;
            display:flex;
            flex-direction:column;
            box-shadow:0 0 10px rgba(0,0,0,.12);
            overflow:hidden;
            position:relative;
        }

        /* --- PANTALLA DE BIENVENIDA --- */
        #bienvenida{
            position:absolute;inset:0;z-index:100;
            background:linear-gradient(135deg,#4db6ac,#26a69a);
            color:white;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:20px;text-align:center;transition:opacity 0.3s;
        }
        #bienvenida.oculto{opacity:0;pointer-events:none;}
        #bienvenida h1{font-size:36px;margin-bottom:10px;}
        #bienvenida p{font-size:16px;margin-bottom:40px;opacity:0.9;}
        #btn-empezar{
            background:white;color:#4db6ac;padding:14px 40px;
            font-size:18px;border-radius:30px;border:none;
            font-weight:bold;cursor:pointer;transition:transform 0.2s;
        }
        #btn-empezar:active{transform:scale(0.97);}

        /* --- CABECERA Y MENÚ LATERAL --- */
        header{
            background:#4db6ac;color:white;padding:15px;
            display:flex;align-items:center;gap:15px;
            font-size:20px;font-weight:bold;
        }
        #btn-menu{background:transparent;border:none;color:white;font-size:22px;cursor:pointer;}
        #menu-lateral{
            position:fixed;left:0;top:0;height:100%;width:280px;
            background:white;z-index:999;transform:translateX(-100%);
            transition:transform 0.3s;padding-top:20px;box-shadow:2px 0 10px rgba(0,0,0,0.1);
        }
        #menu-lateral.abierto{transform:translateX(0);}
        #cortina-menu{
            position:fixed;inset:0;background:rgba(0,0,0,0.4);
            z-index:998;opacity:0;pointer-events:none;transition:opacity 0.3s;
        }
        #cortina-menu.activo{opacity:1;pointer-events:all;}
        .cabecera-perfil{text-align:center;padding:20px;border-bottom:1px solid #eee;}
        .foto-perfil{width:80px;height:80px;border-radius:50%;border:3px solid #4db6ac;object-fit:cover;}
        .opciones-menu{list-style:none;margin-top:15px;}
        .opciones-menu li a{
            display:flex;align-items:center;gap:12px;padding:14px 20px;
            color:inherit;text-decoration:none;font-size:16px;transition:background 0.2s;
        }
        .opciones-menu li a:hover{background:rgba(77,182,172,0.1);}

        /* --- ELEMENTOS GENERALES --- */
        .oculto{display:none!important;}
        input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        button{border:none;border-radius:6px;cursor:pointer;padding:10px 12px;background:#4db6ac;color:white;font-size:15px;transition:.2s;}
        button:hover{background:#42a59c;}

        /* --- AUTENTICACIÓN --- */
        .auth-box{padding:25px;text-align:center;}
        .auth-buttons{display:flex;gap:10px;justify-content:center;margin-top:10px;}

        /* --- CONTENIDO Y PESTAÑAS --- */
        .content-area{flex:1;overflow-y:auto;padding:20px;}
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        nav{display:flex;border-top:1px solid #ddd;background:white;}
        nav button{flex:1;background:none;color:#777;font-size:11px;font-weight:bold;padding:10px;}
        nav button.active{color:#4db6ac;border-top:2px solid #4db6ac;}

        /* --- BUSCADOR --- */
        .search-section{padding:15px;background:white;border-bottom:1px solid #eee;}
        #universalSearch{width:70%;padding:12px;border:2px solid #4db6ac;border-radius:25px;font-size:16px;}
        .btn-web{padding:12px;border-radius:25px;background:#2196f3;}

        /* --- CHAT --- */
        #mensajesChat{height:320px;overflow-y:auto;border:1px solid #eee;padding:12px;border-radius:10px;margin-bottom:10px;background:#fafafa;}
        .mensaje-usuario{background:#d9fdd3;padding:10px 12px;border-radius:8px 0 8px 8px;margin:8px 0 8px auto;max-width:80%;}
        .mensaje-otro{background:white;padding:10px 12px;border-radius:0 8px 8px 8px;margin:8px 0;max-width:80%;}
        .msg-remitente{font-size:12px;color:#4db6ac;font-weight:bold;margin-bottom:5px;}
        .msg-meta{display:flex;justify-content:flex-end;gap:4px;margin-top:5px;font-size:10px;color:#777;}
        .chat-barra{display:flex;gap:6px;align-items:flex-end;}
        .chat-input{flex:1;}
        .chat-botones-accion{display:flex;flex-direction:column;gap:4px;}
        .btn-accion{background:none;border:none;color:#4db6ac;font-size:22px;cursor:pointer;padding:4px;}
        .btn-enviar{width:42px;height:42px;border-radius:50%;background:#26a69a;display:flex;align-items:center;justify-content:center;font-size:20px;}
        #panel-emojis{display:none;flex-wrap:wrap;gap:8px;padding:10px;background:white;border-radius:8px;margin-top:6px;}
        #panel-emojis.activo{display:flex;}
        .emoji{font-size:22px;cursor:pointer;padding:4px;}
        #respuestas-rapidas{display:none;gap:8px;flex-wrap:wrap;margin-top:6px;}
        #respuestas-rapidas.activo{display:flex;}
        .btn-respuesta{background:rgba(77,182,172,0.1);color:#4db6ac;border:none;padding:6px 12px;border-radius:15px;font-size:14px;}

        /* --- TARJETAS Y ARCHIVOS --- */
        .card-citas,.card-archivo{background:white;border-radius:8px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
        .card-citas{border-left:5px solid #ff9800;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
        .card-archivo{border-left:5px solid #2196f3;}
        .card-actions,.file-actions{display:flex;gap:6px;margin-top:10px;}
        .btn-compartir{background:#9c27b0;font-size:13px;padding:6px 10px;}
        .btn-borrar{background:#f44336;font-size:13px;padding:6px 10px;}
        .btn-camara{width:100%;background:#ff9800;margin-bottom:8px;}
        .btn-archivo{width:100%;background:#26a69a;margin-bottom:8px;}
        .img-preview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:8px;}
        .msg-imagen,.msg-video{width:100%;border-radius:8px;}
        .msg-archivo{background:#e3f2fd;padding:10px;border-radius:6px;cursor:pointer;}
        .msg-audio{display:flex;align-items:center;gap:10px;background:#f3f5ff;padding:8px;border-radius:20px;}
        .audio-btn{width:36px;height:36px;border-radius:50%;border:none;background:#4db6ac;color:white;cursor:pointer;}

        /* --- MENSAJES DEL SISTEMA --- */
        .cargando{color:#1976d2;font-size:13px;margin:8px 0;}
        .exito{color:#2e7d32;font-size:13px;margin:8px 0;}
        .error{color:#d32f2f;font-size:13px;margin:8px 0;}

        /* --- MODO OSCURO --- */
        .modo-oscuro{background:#121212!important;color:#f5f5f5!important;}
        .modo-oscuro .app-container,.modo-oscuro nav,.modo-oscuro .card-citas,.modo-oscuro .card-archivo{background:#1e1e1e!important;}
        .modo-oscuro input,.modo-oscuro #mensajesChat{background:#2d2d2d!important;border-color:#444!important;color:white!important;}

        /* --- ADAPTACIÓN A CELULARES --- */
        @media (max-width:600px){
            .app-container{max-width:100%;min-height:100vh;}
            #universalSearch{width:100%;}
            .chat-barra{flex-wrap:wrap;}
            nav button{font-size:10px;}
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- ==================================================
         SECCIÓN 2: INTERFAZ Y ELEMENTOS VISUALES
    ================================================== -->

    <div id="bienvenida">
        <h1>VitalFlow</h1>
        <p>Tu salud y comunidad, siempre contigo</p>
        <button id="btn-empezar">Empezar</button>
    </div>

    <header class="oculto" id="barra-superior">
        <button id="btn-menu">☰</button>
        VitalFlow
    </header>

    <div id="menu-lateral">
        <div class="cabecera-perfil">
            <img id="foto-perfil-menu" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto-perfil">
            <h3 id="nombre-usuario-menu">Cargando...</h3>
            <p id="correo-usuario-menu" style="font-size:13px;color:#666;"></p>
        </div>
        <ul class="opciones-menu">
            <li><a href="#" onclick="Navegacion.mostrarTab('perfil',this);cerrarMenu();return false;">👤 Mi Perfil</a></li>
            <li><a href="#" onclick="document.body.classList.toggle('modo-oscuro');localStorage.setItem('modo',document.body.classList.contains('modo-oscuro')?'oscuro':'claro');cerrarMenu();return false;">🌙 Modo Oscuro</a></li>
            <li><a href="#" onclick="Auth.cerrarSesion();cerrarMenu();return false;">🚪 Cerrar Sesión</a></li>
        </ul>
    </div>
    <div id="cortina-menu" onclick="cerrarMenu()"></div>

    <div id="pantalla-auth" class="auth-box oculto">
        <h2>Bienvenido a VitalFlow</h2>
        <input type="email" id="correoAuth" placeholder="Tu correo electrónico" autocomplete="email">
        <input type="password" id="claveAuth" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="current-password">
        <div class="auth-buttons">
            <button onclick="Auth.iniciarSesion()">Ingresar</button>
            <button onclick="Auth.registrarUsuario()" style="background:#2196f3;">Crear cuenta</button>
        </div>
        <p id="mensajeAuth" style="margin-top:12px;color:#d32f2f;"></p>
    </div>

    <div id="contenido-app" class="oculto">
        <div class="search-section">
            <div class="search-barra">
                <input type="text" id="universalSearch" placeholder="🔍 Buscar en Internet...">
                <button class="btn-web" onclick="Buscar.enWeb()">🔎</button>
            </div>
        </div>

        <div class="content-area">
            <div id="tab-medicinas" class="tab-content active">
                <h2>Mis Medicinas</h2>
                <input type="text" id="medName" placeholder="Nombre del medicamento">
                <input type="time" id="medTime">
                <button onclick="Medicinas.agregarRecordatorio()">Guardar Recordatorio</button>
                <div id="lista-medicinas" style="margin-top:15px;"></div>
            </div>

            <div id="tab-agenda" class="tab-content">
                <h2>Mi Agenda</h2>
                <input type="text" id="citaDoctor" placeholder="Nombre del doctor / Consultorio">
                <input type="datetime-local" id="citaFecha">
                <button onclick="Agenda.agregarCita()">Agendar Cita</button>
                <div id="lista-citas" style="margin-top:15px;"></div>
            </div>

            <div id="tab-archivos" class="tab-content">
                <h2>Mis Documentos e Imágenes</h2>
                <input type="file" id="subir-foto" accept="image/*" style="display:none;">
                <button class="btn-archivo" onclick="document.getElementById('subir-foto').click()">📸 Subir desde Galería</button>
                <input type="file" id="tomar-foto" accept="image/*" capture="environment" style="display:none;">
                <button class="btn-camara" onclick="document.getElementById('tomar-foto').click()">📷 Tomar Foto</button>
                <input type="file" id="subir-documento" accept=".pdf,.doc,.docx,.txt" style="display:none;">
                <button class="btn-archivo" onclick="document.getElementById('subir-documento').click()">📄 Subir Documento</button>
                <div id="cargaEstadoArchivos" class="cargando"></div>
                <div id="lista-archivos" style="margin-top:20px;"></div>
            </div>

            <div id="tab-chat" class="tab-content">
                <h2>Comunidad VitalFlow</h2>
                <div id="mensajesChat"></div>
                <div id="panel-emojis"></div>
                <div id="respuestas-rapidas">
                    <button class="btn-respuesta" onclick="document.getElementById('msgChatInput').value='Hola, ¿cómo estás?';ocultarExtras();">Hola</button>
                    <button class="btn-respuesta" onclick="document.getElementById('msgChatInput').value='Bien, gracias ¿y tú?';ocultarExtras();">Bien gracias</button>
                    <button class="btn-respuesta" onclick="document.getElementById('msgChatInput').value='Nos vemos luego';ocultarExtras();">Nos vemos</button>
                </div>
                <div class="chat-barra">
                    <div class="chat-botones-accion">
                        <button class="btn-accion" onclick="alternarEmojis()" title="Emojis">😊</button>
                        <button class="btn-accion" onclick="alternarRespuestas()" title="Respuestas rápidas">💬</button>
                        <input type="file" id="chatAdjuntar" accept="*" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatAdjuntar').click()" title="Adjuntar archivo">📎</button>
                        <input type="file" id="chatCamara" accept="image/*" capture="environment" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatCamara').click()" title="Tomar foto">📷</button>
                        <input type="file" id="chatVideo" accept="video/*" capture="environment" style="display:none;">
                        <button class="btn-accion" onclick="document.getElementById('chatVideo').click()" title="Grabar video">🎥</button>
                    </div>
                    <input type="text" id="msgChatInput" class="chat-input" placeholder="Escribe un mensaje..." enterkeyhint="send">
                    <button class="btn-enviar" onclick="Chat.enviarMensaje()">➤</button>
                </div>
            </div>

            <div id="tab-perfil" class="tab-content">
                <h2>Mi Perfil</h2>
                <div style="text-align:center;margin-bottom:20px;">
                    <img id="foto-perfil-editar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto-perfil">
                    <input type="file" id="cambiar-foto-perfil" accept="image/*" style="display:none;">
                    <button onclick="document.getElementById('cambiar-foto-perfil').click()" style="margin-top:10px;">Cambiar foto</button>
                </div>
                <input type="text" id="nombre-perfil" placeholder="Tu nombre completo">
                <button onclick="guardarPerfil()">Guardar cambios</button>
            </div>
        </div>

        <nav>
            <button onclick="Navegacion.mostrarTab('medicinas',this)" class="active">Medicinas</button>
            <button onclick="Navegacion.mostrarTab('agenda',this)">Agenda</button>
            <button onclick="Navegacion.mostrarTab('archivos',this)">Archivos</button>
            <button onclick="Navegacion.mostrarTab('chat',this)">Chat</button>
            <button onclick="Navegacion.mostrarTab('perfil',this)">Perfil</button>
        </nav>
    </div>
</div>

    <!-- ==================================================
         SECCIÓN 3: CARGAR FIREBASE (CORREGIDO)
         Ahora se importa bien sin mezclar código
    ================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, push, get, remove, onChildAdded, query, orderByChild } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- TUS DATOS DE FIREBASE Y CLOUDINARY ---
        const firebaseConfig = {
            apiKey: "AIzaSyA-y2DZvJ9L0zl9tBEjY1pYsrQfR5Ky2Zc",
            authDomain: "vitalflow-259c0.firebaseapp.com",
            projectId: "vitalflow-259c0",
            databaseURL: "https://vitalflow-259c0-default-rtdb.firebaseio.com/",
            storageBucket: "vitalflow-259c0.appspot.com",
            messagingSenderId: "650208796328",
            appId: "1:650208796328:web:ea260384268c9b7fcc6c9d"
        };
        const CLOUD_NAME = "rsfldf4n";
        const UPLOAD_PRESET = "vitalflow_archivos";

        // --- INICIAR SERVICIOS ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Poner todo disponible para el resto del código
        window.firebaseServicios = {
            auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signOut, onAuthStateChanged, updateProfile, ref, push, get, remove,
            onChildAdded, query, orderByChild, CLOUD_NAME, UPLOAD_PRESET
        };
    </script>

    <!-- ==================================================
         SECCIÓN 4: FUNCIONES DE LA APLICACIÓN
         AQUÍ YA NO HAY ERROR 404, PORQUE SE USAN LOS SERVICIOS CARGADOS
    ================================================== -->
    <script>
        // Esperar a que Firebase se cargue completamente
        async function iniciarApp(){
            // Esperar un momento y traer los servicios
            while(!window.firebaseServicios) await new Promise(r=>setTimeout(r,50));
            const { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword,
                    signOut, onAuthStateChanged, updateProfile, ref, push, get, remove,
                    onChildAdded, query, orderByChild, CLOUD_NAME, UPLOAD_PRESET } = window.firebaseServicios;

            // --- VARIABLES GENERALES ---
            window.usuarioActual = null;
            window.idsMensajesCargados = new Set();
            window.chatIniciado = false;

            // --- FUNCIÓN PARA MENSAJES ---
            window.mostrarAviso = function(mensaje, error=false){
                const aviso = document.getElementById("cargaEstadoArchivos");
                if(!aviso) return;
                aviso.textContent = mensaje;
                aviso.className = error ? "error" : "exito";
                setTimeout(()=>{aviso.textContent="";aviso.className="";},3500);
            };

            // --- MENÚ Y NAVEGACIÓN ---
            window.cerrarMenu = () => {
                document.getElementById('menu-lateral').classList.remove('abierto');
                document.getElementById('cortina-menu').classList.remove('activo');
            };
            window.Navegacion = {
                mostrarTab(id, boton){
                    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
                    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
                    document.getElementById("tab-"+id).classList.add("active");
                    boton.classList.add("active");
                }
            };

            // --- AUTENTICACIÓN ---
            window.Auth = {
                registrarUsuario: async () => {
                    const correo = document.getElementById("correoAuth").value.trim();
                    const clave = document.getElementById("claveAuth").value;
                    const aviso = document.getElementById("mensajeAuth");
                    const errores = {"auth/invalid-email":"Correo no válido","auth/email-already-in-use":"Este correo ya existe","auth/weak-password":"Mínimo 6 caracteres"};
                    try{
                        await createUserWithEmailAndPassword(auth, correo, clave);
                        aviso.textContent = "✅ Cuenta creada!";
                        aviso.style.color = "#2e7d32";
                    }catch(e){
                        aviso.textContent = "⚠️ " + (errores[e.code] || "Error: " + e.message);
                    }
                },
                iniciarSesion: async () => {
                    const correo = document.getElementById("correoAuth").value.trim();
                    const clave = document.getElementById("claveAuth").value;
                    const aviso = document.getElementById("mensajeAuth");
                    try{
                        await signInWithEmailAndPassword(auth, correo, clave);
                        aviso.textContent = "✅ Entrando...";
                    }catch(e){
                        aviso.textContent = "⚠️ Datos incorrectos o error: " + e.message;
                    }
                },
                cerrarSesion: () => {
                    window.idsMensajesCargados.clear();
                    window.chatIniciado = false;
                    signOut(auth);
                }
            };

            // --- DETECTAR SESIÓN ---
            onAuthStateChanged(auth, (usuario) => {
                window.usuarioActual = usuario;
                if(usuario){
                    document.getElementById("pantalla-auth").classList.add("oculto");
                    document.getElementById("contenido-app").classList.remove("oculto");
                    document.getElementById("barra-superior").classList.remove("oculto");
                    document.getElementById('nombre-usuario-menu').textContent = usuario.displayName || usuario.email.split('@')[0];
                    document.getElementById('correo-usuario-menu').textContent = usuario.email;
                    if(usuario.photoURL){
                        document.getElementById('foto-perfil-menu').src = usuario.photoURL;
                        document.getElementById('foto-perfil-editar').src = usuario.photoURL;
                    }
                    document.getElementById('nombre-perfil').value = usuario.displayName || '';
                    cargarDatos();
                    setTimeout(()=>Chat.iniciarChat(),600);
                }else{
                    document.getElementById("pantalla-auth").classList.remove("oculto");
                    document.getElementById("contenido-app").classList.add("oculto");
                    document.getElementById("barra-superior").classList.add("oculto");
                    window.idsMensajesCargados.clear();
                }
            });

            // --- MEDICINAS ---
            window.Medicinas = {
                agregarRecordatorio: async () => {
                    const nombre = document.getElementById("medName").value.trim();
                    const hora = document.getElementById("medTime").value;
                    if(!nombre || !hora) return alert("Completa todos los datos");
                    if(!usuarioActual) return;
                    try{
                        await push(ref(db, `usuarios/${usuarioActual.uid}/medicinas`), {nombre, hora});
                        document.getElementById("medName").value = "";
                        document.getElementById("medTime").value = "";
                        cargarDatos();
                    }catch(e){
                        mostrarAviso("No se pudo guardar el medicamento", true);
                    }
                }
            };

            // --- AGENDA ---
            window.Agenda = {
                agregarCita: async () => {
                    const doctor = document.getElementById("citaDoctor").value.trim();
                    const fecha = document.getElementById("citaFecha").value;
                    if(!doctor || !fecha) return alert("Completa todos los datos");
                    if(!usuarioActual) return;
                    try{
                        await push(ref(db, `usuarios/${usuarioActual.uid}/citas`), {doctor, fecha});
                        document.getElementById("citaDoctor").value = "";
                        document.getElementById("citaFecha").value = "";
                        cargarDatos();
                    }catch(e){
                        mostrarAviso("No se pudo guardar la cita", true);
                    }
                }
            };

            // --- SUBIR ARCHIVOS A CLOUDINARY ---
            async function subirArchivoCloudinary(archivo){
                const estado = document.getElementById("cargaEstadoArchivos");
                estado.textContent = "⏳ Subiendo..."; estado.className = "cargando";
                try{
                    const formData = new FormData();
                    formData.append("file", archivo);
                    formData.append("upload_preset", UPLOAD_PRESET);
                    formData.append("folder", "vitalflow_archivos");
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {method:"POST", body:formData});
                    const datos = await res.json();
                    if(!res.ok) throw new Error(datos.error?.message || "Error al subir");
                    estado.textContent = "✅ Subido correctamente"; estado.className = "exito";
                    setTimeout(()=>estado.textContent="",3000);
                    return {url:datos.secure_url, nombre:archivo.name, tipo:archivo.type || datos.resource_type};
                }catch(err){
                    estado.textContent = "❌ Error: " + err.message; estado.className = "error";
                    setTimeout(()=>estado.textContent="",5000);
                    throw err;
                }
            }

            // --- GUARDAR ARCHIVOS EN BASE ---
            async function guardarArchivoEnBD(datosArchivo){
                if(!usuarioActual) return;
                await push(ref(db, `usuarios/${usuarioActual.uid}/archivos`), {...datosArchivo, fecha:new Date().toISOString()});
            }

            // --- PROCESAR ARCHIVOS ---
            async function procesarArchivo(e){
                const archivo = e.target.files[0];
                if(!archivo || !usuarioActual) return;
                try{
                    const datos = await subirArchivoCloudinary(archivo);
                    await guardarArchivoEnBD(datos);
                    await cargarDatos();
                }catch(err){console.error(err);}
                e.target.value = "";
            }

            // --- CHAT ---
            window.Chat = {
                iniciarChat: () => {
                    if(window.chatIniciado) return;
                    window.chatIniciado = true;
                    const caja = document.getElementById("mensajesChat");
                    caja.innerHTML = "";
                    onChildAdded(query(ref(db,"chat"), orderByChild("fecha")), (snap) => {
                        if(window.idsMensajesCargados.has(snap.key)) return;
                        window.idsMensajesCargados.add(snap.key);
                        const msg = snap.val();
                        const esMio = msg.remitente === usuarioActual?.email;
                        let contenido = msg.texto ? `<div class="msg-texto">${msg.texto}</div>` : "";
                        if(msg.archivo){
                            if(msg.tipo?.startsWith("image/")) contenido = `<img src="${msg.archivo}" class="msg-imagen">`;
                            else if(msg.tipo?.startsWith("video/")) contenido = `<video src="${msg.archivo}" controls class="msg-video"></video>`;
                            else if(msg.tipo?.startsWith("audio/")) contenido = `<audio controls src="${msg.archivo}">`;
                            else contenido = `<div class="msg-archivo" onclick="location.href='${msg.archivo}'">📄 ${msg.nombreArchivo || "Archivo"}</div>`;
                        }
                        caja.innerHTML += `
                        <div class="${esMio?'mensaje-usuario':'mensaje-otro'}">
                            ${!esMio?`<div class="msg-remitente">${msg.nombreRemitente || msg.remitente.split('@')[0]}</div>`:""}
                            ${contenido}
                            <div class="msg-meta">${new Date(msg.fecha).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ${esMio?'✓✓':''}</div>
                        </div>`;
                        caja.scrollTop = caja.scrollHeight;
                    });
                },
                enviarMensaje: async () => {
                    const entrada = document.getElementById("msgChatInput");
                    const texto = entrada.value.trim();
                    if(!texto || !usuarioActual) return;
                    try{
                        await push(ref(db,"chat"), {
                            texto, remitente:usuarioActual.email,
                            nombreRemitente: usuarioActual.displayName || usuarioActual.email.split('@')[0],
                            fecha: new Date().toISOString()
                        });
                        entrada.value = "";
                    }catch{mostrarAviso("❌ No se pudo enviar", true);}
                },
                enviarArchivoChat: async (datos) => {
                    if(!usuarioActual) return;
                    await push(ref(db,"chat"), {
                        archivo:datos.url, nombreArchivo:datos.nombre, tipo:datos.tipo,
                        remitente:usuarioActual.email, nombreRemitente: usuarioActual.displayName || usuarioActual.email.split('@')[0],
                        fecha: new Date().toISOString()
                    });
                }
            };

            // --- CARGAR TODOS LOS DATOS ---
            window.cargarDatos = async function(){
                if(!usuarioActual) return;
                const uid = usuarioActual.uid;

                const listaMed = document.getElementById("lista-medicinas");
                listaMed.innerHTML = "";
                const meds = await get(ref(db,`usuarios/${uid}/medicinas`));
                if(meds.exists()) Object.entries(meds.val()).forEach(([id,d])=>{
                    listaMed.innerHTML += `<div class="card-citas"><span>💊 ${d.nombre} - ${d.hora}</span>
                    <div class="card-actions"><button class="btn-borrar" onclick="borrarItem('medicinas','${id}')">×</button></div></div>`;
                });

                const listaCitas = document.getElementById("lista-citas");
                listaCitas.innerHTML = "";
                const citas = await get(ref(db,`usuarios/${uid}/citas`));
                if(citas.exists()) Object.entries(citas.val()).forEach(([id,d])=>{
                    listaCitas.innerHTML += `<div class="card-citas"><span>📅 ${d.doctor} - ${d.fecha.replace('T',' ')}</span>
                    <div class="card-actions"><button class="btn-borrar" onclick="borrarItem('citas','${id}')">×</button></div></div>`;
                });

                const listaArch = document.getElementById("lista-archivos");
                listaArch.innerHTML = "";
                const archs = await get(ref(db,`usuarios/${uid}/archivos`));
                if(archs.exists()) Object.entries(archs.val()).forEach(([id,d])=>{
                    let vista = "";
                    if(d.tipo?.startsWith("image/")) vista = `<img src="${d.url}" class="img-preview">`;
                    else vista = `<div class="msg-archivo">📄 ${d.nombre}</div>`;
                    listaArch.innerHTML += `<div class="card-archivo">${vista}<div class="card-actions"><button class="btn-borrar" onclick="borrarItem('archivos','${id}')">×</button></div></div>`;
                });
            };

            // --- BORRAR ---
            window.borrarItem = async function(tipo, id){
                if(!confirm("¿Eliminar este elemento?")) return;
                await remove(ref(db, `usuarios/${usuarioActual.uid}/${tipo}/${id}`));
                await cargarDatos();
            };

            // --- BUSCADOR Y COMPARTIR ---
            window.Buscar = { enWeb(){ const t=document.getElementById("universalSearch").value.trim(); if(t) window.open(`https://www.google.com/search?q=${encodeURIComponent(t)}+salud`,"_blank"); } };
            window.Compartir = {
                texto: async (titulo, texto) => {
                    const m = `📋 VitalFlow - ${titulo}\n\n${texto}`;
                    if(navigator.share) await navigator.share({title:"VitalFlow",text:m});
                    else {await navigator.clipboard.writeText(m); alert("📋 Copiado al portapapeles");}
                }
            };

            // --- PERFIL Y EXTRAS ---
            window.guardarPerfil = async () => {
                const nom = document.getElementById('nombre-perfil').value.trim();
                if(!nom || !usuarioActual) return;
                await updateProfile(usuarioActual, {displayName:nom});
                document.getElementById('nombre-usuario-menu').textContent = nom;
                mostrarAviso('Perfil actualizado ✅');
            };
            window.alternarEmojis = () => {
                document.getElementById('panel-emojis').classList.toggle('activo');
                document.getElementById('respuestas-rapidas').classList.remove('activo');
            };
            window.alternarRespuestas = () => {
                document.getElementById('respuestas-rapidas').classList.toggle('activo');
                document.getElementById('panel-emojis').classList.remove('activo');
            };
            window.ocultarExtras = () => {
                document.getElementById('panel-emojis').classList.remove('activo');
                document.getElementById('respuestas-rapidas').classList.remove('activo');
            };

            // --- INICIO FINAL ---
            document.addEventListener("DOMContentLoaded", () => {
                console.log("✅ VitalFlow iniciado");

                if(localStorage.getItem('modo') === 'oscuro') document.body.classList.add('modo-oscuro');

                document.getElementById('btn-empezar').addEventListener('click', () => {
                    document.getElementById('bienvenida').classList.add('oculto');
                    document.getElementById('pantalla-auth').classList.remove('oculto');
                });

                document.getElementById('btn-menu').onclick = () => {
                    document.getElementById('menu-lateral').classList.add('abierto');
                    document.getElementById('cortina-menu').classList.add('activo');
                };

                const emojis = ['😀','😂','😍','👍','👋','❤️','🙏','😊','🔥','✅','📅','💊','📄','📷'];
                const panel = document.getElementById('panel-emojis');
                emojis.forEach(e=>{
                    const s = document.createElement('span'); s.className='emoji'; s.textContent=e;
                    s.onclick = ()=>{document.getElementById('msgChatInput').value+=e; ocultarExtras();};
                    panel.appendChild(s);
                });

                document.getElementById('subir-foto').addEventListener('change', procesarArchivo);
                document.getElementById('tomar-foto').addEventListener('change', procesarArchivo);
                document.getElementById('subir-documento').addEventListener('change', procesarArchivo);
                document.getElementById('cambiar-foto-perfil').addEventListener('change', async e=>{
                    const a = e.target.files[0];
                    if(!a || !usuarioActual) return;
                    const d = await subirArchivoCloudinary(a);
                    await updateProfile(usuarioActual, {photoURL:d.url});
                    document.getElementById('foto-perfil-menu').src = d.url;
                    document.getElementById('foto-perfil-editar').src = d.url;
                    mostrarAviso('Foto actualizada ✅');
                });
                document.getElementById('chatAdjuntar').addEventListener('change', async e=>{
                    const a = e.target.files[0]; if(!a) return;
                    const d = await subirArchivoCloudinary(a);
                    await Chat.enviarArchivoChat(d);
                    e.target.value = "";
                });
                document.getElementById('chatCamara').addEventListener('change', async e=>{
                    const a = e.target.files[0]; if(!a) return;
                    const d = await subirArchivoCloudinary(a);
                    await Chat.enviarArchivoChat(d);
                    e.target.value = "";
                });
                document.getElementById('chatVideo').addEventListener('change', async e=>{
                    const a = e.target.files[0]; if(!a) return;
                    const d = await subirArchivoCloudinary(a);
                    await Chat.enviarArchivoChat(d);
                    e.target.value = "";
                });

                document.getElementById('msgChatInput').addEventListener('keydown', e=>{
                    if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); Chat.enviarMensaje();}
                });
                document.getElementById('universalSearch').addEventListener('keydown', e=>{
                    if(e.key==='Enter') Buscar.enWeb();
                });
            });
        }

        // Iniciar todo
        iniciarApp();
    </script>

</body>
</html>
